name: Validate Registry

on:
  pull_request:
    paths:
      - "registry/**"
      - "scripts/validate_registry.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate registry (strict mode)
        id: validate
        run: |
          python scripts/validate_registry.py --strict --candidates 2>&1 | tee validate_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment PR with validation results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('validate_output.txt', 'utf8');
            const exitCode = '${{ steps.validate.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ All registry entries valid!' : '❌ Validation failed';

            const body = `## Registry Validation\n\n${status}\n\n\`\`\`\n${output}\n\`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if validation errors
        if: steps.validate.outputs.exit_code != '0'
        run: exit 1

name: Weekly AI-Pulse Update

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      sources:
        description: "Sources to fetch (rss,arxiv)"
        default: "rss,arxiv"
        required: false

jobs:
  fetch-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 jsonschema anthropic

      - name: Run scraper
        run: |
          python scripts/fetch_new.py \
            --sources "${{ github.event.inputs.sources || 'rss,arxiv' }}" \
            --limit 15

      - name: Check for new candidates
        id: check_candidates
        run: |
          TODAY=$(date +%Y-%m-%d)
          CANDIDATE_FILE="registry/candidates/${TODAY}.json"
          if [ -f "$CANDIDATE_FILE" ]; then
            COUNT=$(python -c "import json; data=json.load(open('$CANDIDATE_FILE')); print(len(data))")
            echo "has_candidates=true" >> $GITHUB_OUTPUT
            echo "candidate_count=$COUNT" >> $GITHUB_OUTPUT
            echo "candidate_file=$CANDIDATE_FILE" >> $GITHUB_OUTPUT
            echo "Found $COUNT new candidates"
          else
            echo "has_candidates=false" >> $GITHUB_OUTPUT
            echo "No new candidates found"
          fi

      - name: Run auto-curation
        if: steps.check_candidates.outputs.has_candidates == 'true' && secrets.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CANDIDATE_FILE: ${{ steps.check_candidates.outputs.candidate_file }}
        run: |
          echo "🤖 Running Claude curator on $CANDIDATE_FILE..."
          python agents/curator_agent.py "$CANDIDATE_FILE" --out "$CANDIDATE_FILE"

      - name: Run auto-review
        if: steps.check_candidates.outputs.has_candidates == 'true' && secrets.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CANDIDATE_FILE: ${{ steps.check_candidates.outputs.candidate_file }}
        run: |
          REVIEWED_FILE="${CANDIDATE_FILE%.json}-reviewed.json"
          echo "🔬 Running Claude reviewer on $CANDIDATE_FILE → $REVIEWED_FILE..."
          python agents/review_agent.py "$CANDIDATE_FILE" --threshold 7 --out "$REVIEWED_FILE"

      - name: Create candidate review PR
        if: steps.check_candidates.outputs.has_candidates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add ${{ steps.check_candidates.outputs.candidate_count }} new candidates for review"
          title: "🤖 Weekly Update: ${{ steps.check_candidates.outputs.candidate_count }} new AI tools found"
          body: |
            ## Weekly AI-Pulse Update

            The automated scraper found **${{ steps.check_candidates.outputs.candidate_count }} new candidates**.

            > 🤖 **Entries have been pre-scored by Claude** (`claude-opus-4-6`) via the curator and review agents.
            > Check `${{ steps.check_candidates.outputs.candidate_file }}` for curator notes and
            > `${candidate_file%.json}-reviewed.json` for scores and verdicts.

            ### Review instructions:
            1. Open `${{ steps.check_candidates.outputs.candidate_file }}`
            2. For each entry, verify:
               - [ ] Description is accurate (not just scraped noise)
               - [ ] Category is correct
               - [ ] Curator note is filled in (remove `⚠️ NEEDS HUMAN REVIEW`)
               - [ ] URL works
            3. Move approved entries into the appropriate `registry/*.json` file
            4. Delete or leave entries you want to skip
            5. Merge this PR

            ### After merge:
            The `build-readme` job will automatically rebuild the README.

            ---
            *Generated by AI-Pulse weekly scraper · [View workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          branch: "weekly-update-${{ github.run_id }}"
          labels: "automated-update,needs-review"
          assignees: ${{ github.repository_owner }}

  build-readme:
    runs-on: ubuntu-latest
    # Only rebuild after a PR to main is merged (not on weekly scrape)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate registry
        run: python scripts/validate_registry.py

      - name: Build README
        run: python scripts/build_readme.py

      - name: Commit updated README
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI-Pulse Bot"
          git add README.md
          if git diff --staged --quiet; then
            echo "README unchanged, skipping commit"
          else
            git commit -m "docs: rebuild README from registry [skip ci]"
            git push
          fi

name: "💡 Suggest a Registry Entry"
description: "Propose a new tool, model, framework, paper, or resource for the AI-Pulse registry."
title: "[Entry] "
labels: ["registry-candidate"]
body:
  - type: markdown
    attributes:
      value: |
        ## Suggest an entry for AI-Pulse

        AI-Pulse is maintained by an **agentic pipeline** — once you submit this issue, the agents will:
        1. Pick up your suggestion in the next pipeline run (every 2 days)
        2. Score it 0–10 on relevance, quality, and uniqueness using Llama 3.3 70B
        3. Auto-generate a practitioner-focused curator note
        4. Promote it to the registry if it scores ≥ 7
        **If your entry is accepted, your GitHub username is saved in the registry entry and you're listed in [CONTRIBUTORS.md](../CONTRIBUTORS.md).**
        **Your "Why it matters" answer is the most important field** — the LLM uses it as context when scoring.

  - type: input
    id: github_username
    attributes:
      label: "Your GitHub username"
      description: "So you can be credited in the registry entry and CONTRIBUTORS.md when your suggestion is accepted."
      placeholder: "@yourhandle"
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: "URL *"
      description: "The primary URL for this entry (project homepage, paper, docs)."
      placeholder: "https://example.com"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Category *"
      description: "Which registry category does this belong to?"
      options:
        - llm
        - agent-framework
        - vector-db
        - mcp-server
        - tool
        - dataset
        - paper
        - course
        - project
    validations:
      required: true

  - type: textarea
    id: why_it_matters
    attributes:
      label: "Why it matters"
      description: "In 1–3 sentences, explain why this entry deserves a spot in the registry. What makes it notable or useful?"
      placeholder: "This framework is the only one that supports X, making it essential for Y use-cases..."
    validations:
      required: true

  - type: input
    id: github_url
    attributes:
      label: "GitHub URL (optional)"
      description: "Link to the GitHub repository, if it has one."
      placeholder: "https://github.com/owner/repo"
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: "Tags (optional)"
      description: "Comma-separated list of lowercase tags (1–10 items). Example: `rag, open-source, python`"
      placeholder: "rag, open-source, python"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-submission checklist"
      options:
        - label: "I've searched the existing registry and this entry is not already present."
          required: true
        - label: "The URL is publicly accessible."
          required: true
        - label: "This entry is meaningfully related to AI (not just tangentially)."
          required: true
